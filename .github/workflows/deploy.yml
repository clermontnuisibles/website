name: Déploiement GitHub Pages

on:
  push:
    branches: ["main"]
  # Tous les lundis 05:15 UTC (~06:15 hiver Paris) : snapshot Google Places + redéploiement
  schedule:
    - cron: "15 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Node.js (snapshot Places)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Snapshot Google Places (planifié ou manuel)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          # Si la clé GCP est restreinte par référent HTTP, surchargez (doit matcher la console Google)
          GOOGLE_PLACES_HTTP_REFERER: ${{ vars.GOOGLE_PLACES_HTTP_REFERER }}
        run: node scripts/fetch-google-place.mjs

      - name: Configuration de GitHub Pages
        uses: actions/configure-pages@v6

      - name: Injection de l'URL dans le sitemap
        run: |
          SITE_URL=$(grep "siteUrl:" src/js/config.js | sed "s/.*siteUrl: *'\([^']*\)'.*/\1/")
          LASTMOD=$(date -u +%Y-%m-%d)
          sed -i "s|SITE_URL|$SITE_URL|g" src/sitemap.xml
          sed -i "s|<lastmod>[^<]*</lastmod>|<lastmod>$LASTMOD</lastmod>|g" src/sitemap.xml

      - name: Upload de l'artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "src"

      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
