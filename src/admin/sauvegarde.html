<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sauvegarde – Clermont Nuisibles</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2d6a4f">
  <meta name="application-name" content="Clermont-nuisibles (admin)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Clermont-nuisibles (admin)">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="../images/logo-icon.svg">
  <link rel="stylesheet" href="../fonts/inter.css">
  <link rel="stylesheet" href="admin-shell.css">
  <script src="pwa.js"></script>
  <script src="admin-nav.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f0f2ef; min-height: 100dvh; padding: 2rem 1rem 3rem; display: flex; flex-direction: column; align-items: center; }
    .page-head { max-width: 680px; width: 100%; margin-bottom: 1.75rem; }
    h1 { font-size: 1.3rem; font-weight: 800; color: #1a2e1a; }
    .subtitle { font-size: .83rem; color: #888; margin-top: .25rem; }

    .wrap { max-width: 680px; width: 100%; display: flex; flex-direction: column; gap: 1.25rem; }

    /* Cards */
    .card { background: #fff; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,.08); padding: 1.5rem 1.6rem; }
    .card-title { font-size: .78rem; font-weight: 800; text-transform: uppercase; letter-spacing: .09em; color: #2d6a4f; background: #f0fdf4; border-left: 3px solid #2d6a4f; padding: .3rem .6rem; border-radius: 0 6px 6px 0; margin-bottom: 1.1rem; }
    .card-desc { font-size: .83rem; color: #666; line-height: 1.6; margin-bottom: 1.1rem; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: .4rem; font-family: inherit; font-size: .88rem; font-weight: 700; padding: .65rem 1.35rem; border-radius: 50px; cursor: pointer; border: none; transition: opacity .15s, transform .15s; }
    .btn:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-primary  { background: #2d6a4f; color: #fff; }
    .btn-blue     { background: #1d4ed8; color: #fff; }
    .btn-outline  { background: #fff; color: #2d6a4f; border: 2px solid #2d6a4f; }
    .btn-danger   { background: #fee2e2; color: #b91c1c; border: none; }
    .btn-row      { display: flex; gap: .65rem; flex-wrap: wrap; align-items: center; }

    /* Modules list */
    .modules { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1.1rem; }
    .mod-row { display: flex; align-items: center; justify-content: space-between; font-size: .82rem; padding: .4rem .65rem; background: #f9fafb; border-radius: 8px; }
    .mod-name { font-weight: 600; color: #1a2e1a; }
    .mod-count { font-size: .75rem; color: #888; background: #e5e7eb; padding: 1px 8px; border-radius: 20px; }
    .mod-count.has-data { background: #d1fae5; color: #065f46; }

    /* Drive section */
    .drive-status { display: flex; align-items: center; gap: .7rem; padding: .75rem 1rem; border-radius: 10px; font-size: .84rem; margin-bottom: 1rem; }
    .drive-status.disconnected { background: #f3f4f6; color: #6b7280; }
    .drive-status.connected    { background: #d1fae5; color: #065f46; }
    .drive-status.error        { background: #fee2e2; color: #b91c1c; }
    .drive-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot-grey  { background: #9ca3af; }
    .dot-green { background: #16a34a; }
    .dot-red   { background: #dc2626; }
    .drive-user { font-weight: 700; }

    /* Drive files list */
    .drive-files { display: flex; flex-direction: column; gap: .35rem; max-height: 200px; overflow-y: auto; margin: .85rem 0; }
    .drive-file { display: flex; align-items: center; justify-content: space-between; gap: .5rem; padding: .45rem .75rem; background: #f9fafb; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: .81rem; cursor: pointer; transition: border-color .15s; }
    .drive-file:hover { border-color: #2d6a4f; background: #f0fdf4; }
    .drive-file.selected { border-color: #2d6a4f; background: #f0fdf4; }
    .df-name { font-weight: 600; color: #1a2e1a; }
    .df-date { color: #aaa; font-size: .74rem; }
    .no-files { font-size: .82rem; color: #aaa; padding: .65rem; text-align: center; }

    /* Setup instructions */
    .setup-box { background: #fffbeb; border: 1.5px solid #fcd34d; border-radius: 12px; padding: 1rem 1.1rem; font-size: .81rem; line-height: 1.65; color: #78350f; }
    .setup-box ol { padding-left: 1.25rem; margin-top: .5rem; }
    .setup-box li { margin-bottom: .3rem; }
    .setup-box code { background: #fef3c7; padding: 1px 5px; border-radius: 4px; font-size: .78rem; font-family: monospace; }
    .setup-box a { color: #b45309; }

    /* Last backup info */
    .last-backup { font-size: .78rem; color: #aaa; margin-top: .65rem; }
    .last-backup strong { color: #4b5563; }

    /* Progress bar */
    .progress { height: 4px; background: #e5e7eb; border-radius: 99px; overflow: hidden; margin-top: .85rem; display: none; }
    .progress-bar { height: 100%; background: #2d6a4f; border-radius: 99px; width: 0; transition: width .3s; }

    /* Toast */
    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1a2e1a; color: #fff; font-size: .84rem; font-weight: 600; padding: .65rem 1.35rem; border-radius: 50px; box-shadow: 0 8px 30px rgba(0,0,0,.25); z-index: 200; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .toast.error { background: #b91c1c; }

    /* Restore confirm */
    .restore-warn { background: #fff7ed; border: 1.5px solid #fb923c; border-radius: 10px; padding: .75rem 1rem; font-size: .81rem; color: #9a3412; margin-bottom: .85rem; display: none; }

    .storage-note { font-size: .72rem; color: #aaa; max-width: 680px; width: 100%; margin-top: 1rem; padding: .65rem .85rem; background: #f8fafc; border-radius: 8px; line-height: 1.55; }
  </style>
</head>
<body>

<div class="page-head">
  <h1>💾 Sauvegarde & Restauration</h1>
  <div class="subtitle">Exportez vos données admin (clients, stock, traitements…) et restaurez-les si besoin.</div>
</div>

<div class="wrap">

  <!-- ── Module summary ── -->
  <div class="card">
    <div class="card-title">Données stockées localement</div>
    <div class="modules" id="modules-list"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="exportJSON()">⬇ Exporter (fichier JSON)</button>
      <button class="btn btn-blue" onclick="shareBackup()">↗ Partager (envoyer le fichier)</button>
      <label class="btn btn-outline" style="cursor:pointer;">
        ⬆ Importer un fichier
        <input type="file" id="import-file" accept=".json,application/json" style="display:none;" onchange="importJSON(this)">
      </label>
    </div>
    <div id="last-export" class="last-backup"></div>
  </div>

</div>

<div class="storage-note">🔒 Toutes les données restent dans votre navigateur (localStorage). Utilisez l'export JSON pour sauvegarder et l'import pour restaurer.</div>

<div class="toast" id="toast"></div>

<script src="../js/config.js"></script>
<script>
/* ===== Constantes & helpers ===== */
var STORE_KEYS = [
  { key: 'cn_clients',     label: '👥 Carnet clients',           page: 'suivi-clients.html' },
  { key: 'cn_stock',       label: '🧪 Stock biocides',           page: 'stock-biocides.html' },
  { key: 'cn_traitements', label: '📖 Registre des traitements', page: 'registre-traitements.html' },
  { key: 'cn_certifs',     label: '🔔 Alertes certifications',   page: 'alertes-certifications.html' }
];
var BACKUP_FILE_PREFIX = 'cn-backup-';

function loadLS(key){ try{ return JSON.parse(localStorage.getItem(key)||'null'); }catch(e){ return null; } }
function countItems(key){ var d=loadLS(key); return Array.isArray(d)?d.length:(d?'?':0); }
function toast(msg, isError){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError?' error':'');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.className='toast'; }, 3200);
}
function formatDatetime(iso){ if(!iso) return ''; var d=new Date(iso); return d.toLocaleDateString('fr-FR')+' à '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }

/* ===== Module summary ===== */
function renderModules(){
  var html = STORE_KEYS.map(function(m){
    var n = countItems(m.key);
    return '<div class="mod-row">' +
      '<span class="mod-name">' + m.label + '</span>' +
      '<span class="mod-count' + (n>0?' has-data':'') + '">' + n + ' entrée(s)</span>' +
    '</div>';
  }).join('');
  document.getElementById('modules-list').innerHTML = html;
}

/* ===== Export JSON ===== */
function collectBackup(){
  var data = { version: 1, exportedAt: new Date().toISOString(), modules: {} };
  STORE_KEYS.forEach(function(m){ data.modules[m.key] = loadLS(m.key); });
  return data;
}

function buildBackupFile(){
  var data  = collectBackup();
  var date  = new Date().toISOString().replace(/[:.]/g,'-').slice(0,16);
  var fname = BACKUP_FILE_PREFIX + date + '.json';
  var content = JSON.stringify(data, null, 2);
  var blob  = new Blob([content], { type: 'application/json' });
  return { fname: fname, blob: blob };
}

function exportJSON(){
  var pack  = buildBackupFile();
  var fname = pack.fname;
  var blob  = pack.blob;
  var url   = URL.createObjectURL(blob);
  var a     = document.createElement('a');
  a.href    = url; a.download = fname;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 500);
  var now = new Date().toISOString();
  localStorage.setItem('cn_last_export', now);
  document.getElementById('last-export').innerHTML = 'Dernier export : <strong>' + formatDatetime(now) + '</strong>';
  toast('✅ Fichier exporté : ' + fname);
}

async function shareBackup(){
  try {
    var pack = buildBackupFile();
    var file = new File([pack.blob], pack.fname, { type: 'application/json' });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        title: 'Sauvegarde Clermont Nuisibles (admin)',
        text: 'Fichier de sauvegarde admin (JSON).',
        files: [file]
      });
      toast('✅ Partage ouvert');
      return;
    }

    // Fallback : téléchargement classique si le partage n’est pas supporté
    exportJSON();
    toast('ℹ️ Partage non supporté ici — fichier téléchargé');
  } catch (err) {
    // L’utilisateur peut annuler le partage : on ne considère pas ça comme une erreur bloquante
    if (err && (err.name === 'AbortError' || err.name === 'NotAllowedError')) return;
    toast('❌ Impossible de partager le fichier', true);
  }
}

/* ===== Import JSON ===== */
function importJSON(input){
  var file = input.files[0];
  if (!file) return;
  if (!confirm('⚠️ Cette action remplace TOUTES les données locales par celles du fichier. Confirmer ?')){ input.value=''; return; }
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var data = JSON.parse(e.target.result);
      if (!data.modules) throw new Error('Format invalide');
      var count = 0;
      STORE_KEYS.forEach(function(m){
        if (data.modules[m.key] !== undefined && data.modules[m.key] !== null){
          localStorage.setItem(m.key, JSON.stringify(data.modules[m.key]));
          count++;
        }
      });
      renderModules();
      toast('✅ Restauration effectuée (' + count + ' module(s)) depuis ' + file.name);
    } catch(err){
      toast('❌ Fichier invalide ou corrompu', true);
    }
    input.value = '';
  };
  reader.onerror = function(){ toast('❌ Erreur de lecture du fichier', true); input.value=''; };
  reader.readAsText(file);
}

/* ===== Init ===== */
var lastExport = localStorage.getItem('cn_last_export');
if (lastExport) document.getElementById('last-export').innerHTML = 'Dernier export : <strong>' + formatDatetime(lastExport) + '</strong>';
renderModules();
</script>
</body>
</html>
