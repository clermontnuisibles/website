<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fond carré arrondi vert -->
  <rect width="100" height="100" rx="22" fill="#1B4332"/>

  <!-- Bouclier blanc -->
  <path d="M50 11 L84 23 L84 55 Q84 77 50 89 Q16 77 16 55 L16 23 Z" fill="white"/>

  <!-- Corps de l'insecte (vert foncé sur fond blanc) -->
  <ellipse cx="50" cy="57" rx="9" ry="13" fill="#1B4332"/>

  <!-- Tête -->
  <circle cx="50" cy="41" r="7" fill="#1B4332"/>

  <!-- Antennes -->
  <line x1="46" y1="35" x2="38" y2="26" stroke="#1B4332" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="54" y1="35" x2="62" y2="26" stroke="#1B4332" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="38" cy="26" r="2" fill="#1B4332"/>
  <circle cx="62" cy="26" r="2" fill="#1B4332"/>

  <!-- 3 paires de pattes -->
  <line x1="41" y1="50" x2="27" y2="45" stroke="#1B4332" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="57" x2="26" y2="56" stroke="#1B4332" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="64" x2="28" y2="70" stroke="#1B4332" stroke-width="2" stroke-linecap="round"/>
  <line x1="59" y1="50" x2="73" y2="45" stroke="#1B4332" stroke-width="2" stroke-linecap="round"/>
  <line x1="59" y1="57" x2="74" y2="56" stroke="#1B4332" stroke-width="2" stroke-linecap="round"/>
  <line x1="59" y1="64" x2="72" y2="70" stroke="#1B4332" stroke-width="2" stroke-linecap="round"/>

  <!-- Cercle d'interdiction rouge -->
  <circle cx="50" cy="52" r="24" fill="none" stroke="#DC2626" stroke-width="5" stroke-linecap="round"/>
  <!-- Barre diagonale rouge -->
  <line x1="33" y1="35" x2="67" y2="69" stroke="#DC2626" stroke-width="5" stroke-linecap="round"/>
</svg>
